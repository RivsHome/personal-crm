services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3636
      DATABASE_URL: postgres://${POSTGRES_USER:-personal_crm}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-personal_crm}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3636"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3636/api/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - personal_crm_api_data:/app/data

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_crm}
      POSTGRES_USER: ${POSTGRES_USER:-personal_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5433:5432"
    volumes:
      - personal_crm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  personal_crm_postgres:
  personal_crm_api_data:
