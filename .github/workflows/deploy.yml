name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dokploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy Dokploy compose app
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL || 'https://dokploy.rivsconsole.shop' }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          test -n "$DOKPLOY_API_KEY" || { echo "Missing DOKPLOY_API_KEY repository secret"; exit 1; }
          test -n "$DOKPLOY_COMPOSE_ID" || { echo "Missing DOKPLOY_COMPOSE_ID repository secret"; exit 1; }
          curl --fail --show-error --silent \
            --request POST "$DOKPLOY_URL/api/compose.redeploy" \
            --header "Content-Type: application/json" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --data "{\"composeId\":\"$DOKPLOY_COMPOSE_ID\",\"title\":\"GitHub deploy ${GITHUB_SHA}\",\"description\":\"Triggered by push to ${GITHUB_REF_NAME}\"}"
